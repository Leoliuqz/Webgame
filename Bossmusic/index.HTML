<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boss Music Game</title>
    <link href="bossmusic.CSS" rel="stylesheet" type="text/css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
</head>
<body>
    <div id="game-container">
        <div id="sketch-holder"></div>
        <div id="hud">
            <div>WASD Move | Space Jump | R Reset</div>
        </div>
    </div>
    <script>
        let playerImg, chessImg, bgImg;
        let player, platforms = [], flag, gameWon = false;

        function preload() {
            playerImg = loadImage('images/player.png');
            chessImg = loadImage('images/chess-piece.png');
            bgImg = loadImage('images/background.jpg');
        }

        function setup() {
            let c = createCanvas(900, 500);
            c.parent('sketch-holder');
            c.canvas.removeAttribute('tabindex');
            resetGame();
        }

        function draw() {
            if (gameWon) {
                drawWinScreen();
                return;
            }
            drawBackground();
            player.update();
            for (let p of platforms) {
                player.checkCollision(p);
            }
            flag.checkWin(player);
            player.show();
            for (let p of platforms) {
                p.show();
            }
            flag.show();
        }

        function keyPressed() {
            if (gameWon) {
                if (key === 'r' || keyCode === 82) {
                    resetGame();
                }
                return;
            }
            if (keyCode === UPARROW || key === ' ') {
                player.jump();
            }
            if (key === 'r' || keyCode === 82) {
                resetGame();
            }
        }

        function drawWinScreen() {
            fill(0, 0, 0, 200);
            rect(0, 0, width, height);
            fill(255, 215, 0);
            textAlign(CENTER, CENTER);
            textSize(64);
            textFont('Arial Black');
            text('WIN!', width / 2, height / 2 - 50);
            textSize(24);
            fill(255);
            text('Press R to play again', width / 2, height / 2 + 50);
        }

        function resetGame() {
            gameWon = false;
            player = new Player();
            generatePlatforms();
            flag = new Flag(810, 70);
        }

        function generatePlatforms() {
            platforms = [];
            platforms.push(new Platform(20, height - 60, 100, 20, '#000000'));
            platforms.push(new Platform(750, 80, 100, 20, '#000000'));
            platforms.push(new Platform(180, 400, 50, 15, '#000000'));
            platforms.push(new Platform(300, 380, 50, 15, '#000000'));
            platforms.push(new Platform(400, 290, 60, 15, '#000000'));
            platforms.push(new Platform(190, 220, 150, 15, '#000000'));
            platforms.push(new Platform(90, 160, 60, 15, '#000000'));
            platforms.push(new Platform(210, 80, 180, 15, '#000000'));
            platforms.push(new Platform(480, 120, 80, 15, '#000000'));
            platforms.push(new Platform(650, 140, 40, 15, '#000000'));
        }

        class Flag {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 30;
                this.height = 50;
            }

            show() {
                image(chessImg, this.x, this.y, this.width, this.height);
            }

            checkWin(player) {
                if (player.x + player.width > this.x &&
                    player.x < this.x + this.width &&
                    player.y + player.height > this.y &&
                    player.y < this.y + this.height) {
                    gameWon = true;
                }
            }
        }

        class Player {
            constructor() {
                this.x = 50;
                this.y = 380;
                this.vx = 0;
                this.vy = 0;
                this.width = 30;
                this.height = 40;
                this.speed = 4;
                this.jumpPower = -12;
                this.gravity = 0.6;
                this.onGround = false;
            }

            update() {
                this.vx = 0;
                if (keyIsDown(65) || keyIsDown(LEFT_ARROW)) {
                    this.vx = -this.speed;
                }
                if (keyIsDown(68) || keyIsDown(RIGHT_ARROW)) {
                    this.vx = this.speed;
                }
                if (!this.onGround) {
                    this.vy += this.gravity;
                }
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0) {
                    this.x = 0;
                }
                if (this.x > width - this.width) {
                    this.x = width - this.width;
                }
                if (this.y > height) {
                    this.reset();
                    this.onGround = false;
                }
            }

            jump() {
                if (this.onGround) {
                    this.vy = this.jumpPower;
                    this.onGround = false;
                }
            }

            checkCollision(p) {
                if (this.x < p.x + p.w &&
                    this.x + this.width > p.x &&
                    this.y < p.y + p.h &&
                    this.y + this.height > p.y) {
                    if (this.vy > 0) {
                        this.y = p.y - this.height;
                        this.vy = 0;
                        this.onGround = true;
                    }
                }
            }

            show() {
                image(playerImg, this.x, this.y, this.width, this.height);
            }

            reset() {
                this.x = 50;
                this.y = 380;
                this.vx = 0;
                this.vy = 0;
            }
        }

        class Platform {
            constructor(x, y, w, h, c) {
                this.x = x;
                this.y = y;
                this.w = w;
                this.h = h;
                this.color = c || '#8B4513';
            }

            show() {
                fill(this.color);
                stroke(139, 69, 19);
                strokeWeight(2);
                rect(this.x, this.y, this.w, this.h);
            }
        }

        function drawBackground() {
            background(135, 206, 235);
            for (let i = 0; i <= height; i++) {
                let inter = map(i, 0, height, 0, 1);
                let c = lerpColor(color(135, 206, 235), color(144, 238, 144), inter);
                stroke(c);
                line(0, i, width, i);
            }
            image(bgImg, 0, 0, width, height);
        }

        function windowResized() {
            resizeCanvas(windowWidth - 40, window.innerHeight - 200);
        }
    </script>
</body>
</html>
